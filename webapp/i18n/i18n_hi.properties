appTitle=फल की दुकान
appDescription=शहर की सबसे अच्छी फल की दुकान में आपका स्वागत है! हम सस्ती कीमतों पर ताजे और स्वादिष्ट फलों की विस्तृत किस्में प्रदान करते हैं। चाहे आप रसदार संतरे, मीठे स्ट्रॉबेरी, या कुरकुरे सेब खोज रहे हों, हमारे पास सब कुछ है। हमारा मैत्रीपूर्ण कर्मचारी आपकी जरूरतों के लिए परिपूर्ण फल खोजने में आपकी सहायता करने के लिए यहां है। आज ही हमारी यात्रा करें और प्रकृति के सर्वश्रेष्ठ का स्वाद लें!
msg=अरे दोस्त, मैंने अभी आपके प्रबंधक को सूचित किया है कि आप SAP UI5 सीख रहे हैं 😊